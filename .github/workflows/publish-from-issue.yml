name: Publish Post with LLM Frontmatter

on:
  issues:
    types: [opened, labeled]

jobs:
  publish:
    # 1. 작성자가 레포지토리 소유자(hitel00000)인지 검증
    # 2. 지정된 두 라벨 중 하나를 가졌는지 검증
    if: |
      github.event.issue.user.login == 'hitel00000' &&
      (contains(github.event.issue.labels.*.name, 'publish:essay') || contains(github.event.issue.labels.*.name, 'publish:conversation'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process Issue with LLM and Create Markdown
        uses: actions/github-script@v7
        id: publish
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            async function fetchWithRetry(url, options, maxRetries = 3, initialDelayMs = 2000) {
              let retries = 0;
              while (true) {
                try {
                  const response = await fetch(url, options);
                  if (response.ok) return response;
                  
                  const shouldRetry = response.status === 429 || (response.status >= 500 && response.status < 600);
                  if (shouldRetry && retries < maxRetries) {
                    retries++;
                    const delay = initialDelayMs * Math.pow(2, retries - 1);
                    console.warn(`API returned status ${response.status}. Retrying in ${delay}ms (Attempt ${retries}/${maxRetries})...`);
                    await new Promise(resolve => setTimeout(resolve, delay));
                    continue;
                  }
                  return response;
                } catch (error) {
                  if (retries < maxRetries) {
                    retries++;
                    const delay = initialDelayMs * Math.pow(2, retries - 1);
                    console.warn(`Network error: ${error.message}. Retrying in ${delay}ms (Attempt ${retries}/${maxRetries})...`);
                    await new Promise(resolve => setTimeout(resolve, delay));
                    continue;
                  }
                  throw error;
                }
              }
            }

            const issue = context.payload.issue;
            
            // [방어 1] 이미 처리되어 Close된 이슈라면 즉시 중단 (중복 실행 방지)
            if (issue.state === 'closed') {
              console.log("Issue is already closed. Skipping execution.");
              return;
            }

            const labels = issue.labels.map(l => l.name);
            
            // 카테고리 판별
            let category = '';
            if (labels.includes('publish:essay')) {
              category = 'essays';
            } else if (labels.includes('publish:conversation')) {
              category = 'conversations';
            }
            if (!category) return;

            // [방어 2] 본문에서 템플릿 안내문구, HTML 주석, 명시적으로 기재된 날짜 라인 제거
            let bodyText = issue.body || '';
            bodyText = bodyText
              .replace(/<!--[\s\S]*?-->/g, '') // HTML 주석 제거
              .replace(/(?:^|\n)date:\s*\d{4}-\d{2}-\d{2}/gi, '') // 수동 입력 날짜 라인 제거
              .replace(/여기부터\s*(에세이|대화)\s*본문\s*내용을\s*작성해\s*주세요\.?/g, '') // 안내 문구 제거
              .replace(/사용자님은\s*그냥\s*자유롭게\s*글을\s*써서\s*올리시면\s*됩니다\.?/g, '')
              .replace(/\(이슈\s*제목의\s*\[(Essay|Conversation)\]\s*접두사와\s*본문의\s*주석\s*설명은\s*발행\s*시\s*자동으로\s*제거됩니다\.\)?/g, '')
              .trim();

            // 1. 오늘 날짜 포맷팅 (KST는 UTC+9)
            const dateObj = new Date(issue.created_at);
            const kstOffset = 9 * 60 * 60 * 1000;
            const kstDate = new Date(dateObj.getTime() + kstOffset);
            const yyyy = kstDate.getUTCFullYear();
            const mm = String(kstDate.getUTCMonth() + 1).padStart(2, '0');
            const dd = String(kstDate.getUTCDate()).padStart(2, '0');
            const defaultDateStr = `${yyyy}-${mm}-${dd}`;
            
            let dateStr = defaultDateStr;

            // [날짜 임의 지정 처리] 본문에 명시적으로 "date: YYYY-MM-DD"가 적혀있는지 1차 정규식 체크
            const explicitDateMatch = bodyText.match(/(?:^|\n)date:\s*(\d{4}-\d{2}-\d{2})/i);
            if (explicitDateMatch) {
              dateStr = explicitDateMatch[1];
              console.log(`Explicit date found in body text: ${dateStr}`);
            }

            // 2. Gemini LLM API 호출하여 Frontmatter 데이터 정제
            const apiKey = process.env.GEMINI_API_KEY ? process.env.GEMINI_API_KEY.trim() : '';
            let title = issue.title.replace(/^\[(Essay|Conversation)\]\s*/i, '').trim(); 
            let description = '';
            let tags = [];
            let slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''); 

            if (apiKey) {
              try {
                console.log("Calling Gemini v1beta API (gemini-3.5-flash)...");
                
                const prompt = `
                아래 블로그 원문과 사용자가 입력한 임시 제목을 분석하여, Astro 정적 블로그에 들어갈 메타데이터(제목, 요약, 태그, 슬러그, 날짜)를 추출 및 가공해 주세요.
                
                - 임시 제목: "${title}"
                - 본문 내용:
                """
                ${bodyText}
                """
                
                [요청 사항]
                1. title: 원문을 바탕으로 다듬은 매력적이고 자연스러운 블로그 제목 (한글로 1줄 요약)
                2. description: 글 전체 내용을 요약한 한두 줄의 요약문
                3. tags: 글 주제에 어울리는 대표 태그 2~3개 (영어 소문자로 구성)
                4. slug: title 내용을 바탕으로 연상할 수 있는, URL 경로에 어울리는 영문 소문자 하이픈(-) 형태의 슬러그 (예: "attention-is-all-you-need-too"). 특수문자는 제거해 주세요.
                5. date: 본문 내용이나 제목 등에서 글이 실제 작성된 과거 날짜 정보(예: "2024년 5월 12일 작성", "2023-08-11에 남긴 메모" 등)가 단서로 제공되었다면 YYYY-MM-DD 포맷으로 추출해 주세요. 언급이 전혀 없다면 빈 문자열("")을 반환해 주세요.
                
                다음 JSON 형식을 엄격히 지켜서 답변해 주세요. JSON 외에 다른 설명 텍스트나 마크다운 코드 블록(\`\`\`)은 절대로 넣지 마세요:
                {
                  "title": "생성된 제목",
                  "description": "생성된 요약문",
                  "tags": ["tag1", "tag2"],
                  "slug": "english-slug-format",
                  "date": "YYYY-MM-DD 또는 빈문자열"
                }
                `;

                // [버그 수정 및 최적화]
                // 1. 은퇴한 1.5 계열 모델 대신, 2026년 기준 실사용 표준 모델인 'gemini-3.5-flash'를 사용합니다.
                // 2. 구글 API 게이트웨이 스펙에 따른 400 Bad Request 에러를 원천 피하기 위해 generation_config 설정은 생략하고 
                //    전달받은 JSON 텍스트에서 정규식(Regex)을 이용해 마크다운 백틱을 지우고 깔끔하게 추출합니다.
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                  })
                });

                // [방어 3] API 비정상 응답 체크 (디버깅을 위해 에러 상세 본문 로깅)
                if (!response.ok) {
                  const errorResponseBody = await response.text();
                  throw new Error(`Gemini API returned status ${response.status}: ${errorResponseBody}`);
                }

                const resData = await response.json();
                
                if (resData.candidates && resData.candidates[0] && resData.candidates[0].content) {
                  let jsonText = resData.candidates[0].content.parts[0].text;
                  
                  // [방어 4] 마크다운 코드 블록 제거 및 JSON 정제
                  jsonText = jsonText.replace(/^\s*```(?:json)?/i, '').replace(/```\s*$/, '').trim();
                  
                  const aiResult = JSON.parse(jsonText);

                  title = aiResult.title || title;
                  description = aiResult.description || '';
                  tags = aiResult.tags || [];
                  slug = aiResult.slug ? aiResult.slug.toLowerCase().replace(/[^a-z0-9-]+/g, '') : slug;
                  
                  // 본문 정규식으로 직접 지정 날짜를 못 찾았고, AI가 본문에서 과거 날짜를 발견했다면 대입
                  if (!explicitDateMatch && aiResult.date && /^\d{4}-\d{2}-\d{2}$/.test(aiResult.date)) {
                    dateStr = aiResult.date;
                    console.log(`LLM extracted date from text: ${dateStr}`);
                  }
                  
                  console.log("LLM Generation Success:", aiResult);
                } else {
                  console.warn("Unexpected Gemini API response structure:", resData);
                }
              } catch (err) {
                console.error("Gemini API Error, falling back to defaults:", err);
              }
            } else {
              console.log("No GEMINI_API_KEY secret found. Proceeding with basic Frontmatter.");
            }

            // 3. 파일명 최종 정제
            const filename = `${dateStr}-${slug}.md`;
            const filepath = path.join('src', 'content', category, filename);

            // [방어 5] YAML 문자열 이스케이프 및 안전 포맷 처리
            const cleanTitle = title.replace(/"/g, '\\"').replace(/\n/g, ' ');
            const cleanDesc = description.replace(/"/g, '\\"').replace(/\n/g, ' ');

            const frontmatterLines = [
              '---',
              `title: "${cleanTitle}"`,
              `description: "${cleanDesc}"`,
              `date: ${dateStr}`
            ];
            
            // [검증 반영] tags가 빈 배열이거나 유효하지 않을 때, Frontmatter tags: 누락 필터링
            if (tags && tags.length > 0) {
              frontmatterLines.push('tags:');
              tags.forEach(tag => {
                frontmatterLines.push(`  - ${tag}`);
              });
            }
            
            frontmatterLines.push('---');
            frontmatterLines.push('');
            frontmatterLines.push(bodyText);

            const fileContent = frontmatterLines.join('\n');

            // 5. 파일 쓰기
            fs.mkdirSync(path.dirname(filepath), { recursive: true });
            fs.writeFileSync(filepath, fileContent, 'utf-8');
            
            core.setOutput('filepath', filepath);
            core.setOutput('title', title);
            core.setOutput('filename', filename);

      - name: Update Semantic Curation Map
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/curate-posts.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: publish post '${{ steps.publish.outputs.title }}' and update semantic curation map" || exit 0
          git push

      - name: Comment and Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            const filepath = "${{ steps.publish.outputs.filepath }}";
            const filename = "${{ steps.publish.outputs.filename }}";
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/${filepath}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🎉 **성공적으로 발행되었습니다!**\n- **생성된 파일**: [${filename}](${repoUrl})\n- **작업**: GitHub Pages 배포 완료 시 자동으로 블로그에 노출됩니다.`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });
